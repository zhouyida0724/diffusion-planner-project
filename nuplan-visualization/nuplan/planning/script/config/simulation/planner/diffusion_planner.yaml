diffusion_planner:
  _target_: nuplan.diffusion_planner.planner.DiffusionPlanner
  _convert_: "all"

  config:
    _target_: nuplan.diffusion_planner.utils.config.Config
    _convert_: "all"

    args_file: /workspace/checkpoints/args.json

    guidance_fn: null
  ckpt_path: /workspace/checkpoints/model.pth

  past_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 20
    time_horizon: 2

  future_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 80
    time_horizon: 8

  device: cpu
